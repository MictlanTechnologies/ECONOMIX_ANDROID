spring.datasource.url=jdbc:mysql://localhost:3306/economix?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=changeme
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

# ── JWT ────────────────────────────────────────────────────────────────────────
# Define la variable de entorno del sistema con el nombre EXACTO: ECONOMIX_JWT_SECRET
#   Windows (persistente):  setx ECONOMIX_JWT_SECRET "tu-secreto-de-32-o-mas-caracteres"
#   Linux/Mac:              export ECONOMIX_JWT_SECRET=tu-secreto-de-32-o-mas-caracteres
# Recomendado: mínimo 32 caracteres alfanuméricos aleatorios.
# Después de setx en Windows, cierra y vuelve a abrir la terminal/IDE.
economix.jwt.secret=${ECONOMIX_JWT_SECRET:}

# ── IA / Gemini ────────────────────────────────────────────────────────────────
# Define la variable de entorno del sistema con el nombre EXACTO: GEMINI_API_KEY
#   IMPORTANTE: el nombre NO puede contener espacios.
#   Correcto:   GEMINI_API_KEY          (sin espacios — estándar POSIX/Windows)
#   Incorrecto: "GEMINI API KEY"        (con espacios — nombre de variable inválido)
#
#   Windows (persistente):  setx GEMINI_API_KEY "tu-api-key-de-gemini"
#   Linux/Mac:              export GEMINI_API_KEY=tu-api-key-de-gemini
#
# Después de setx en Windows, cierra y vuelve a abrir la terminal/IDE.
economix.ai.gemini.api-key=${GEMINI_API_KEY:}
